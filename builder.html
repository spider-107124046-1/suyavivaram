      const DEFAULT_CROP = { x: 0, y: 0, width: 0, height: 0, unit: "px" };

      const clamp = (val, min, max) => Math.min(Math.max(val, min), max);

      const areCropsEqual = (a, b) => a === b || (a.width === b.width && a.height === b.height && a.x === b.x && a.y === b.y && a.unit === b.unit);

      function makeAspectCrop(crop, aspect, width, height) {
        const pixelCrop = convertToPixelCrop(crop, width, height);
        if (crop.width) pixelCrop.height = pixelCrop.width / aspect;
        if (crop.height) pixelCrop.width = pixelCrop.height * aspect;
        if (pixelCrop.y + pixelCrop.height > height) {
          pixelCrop.height = height - pixelCrop.y;
          pixelCrop.width = pixelCrop.height * aspect;
        }
        if (pixelCrop.x + pixelCrop.width > width) {
          pixelCrop.width = width - pixelCrop.x;
          pixelCrop.height = pixelCrop.width / aspect;
        }
        return crop.unit === "%" ? convertToPercentCrop(pixelCrop, width, height) : pixelCrop;
      }

      function centerCrop(crop, width, height) {
        const pixelCrop = convertToPixelCrop(crop, width, height);
        pixelCrop.x = (width - pixelCrop.width) / 2;
        pixelCrop.y = (height - pixelCrop.height) / 2;
        return crop.unit === "%" ? convertToPercentCrop(pixelCrop, width, height) : pixelCrop;
      }

      function convertToPercentCrop(crop, width, height) {
        if (crop.unit === "%") return { ...DEFAULT_CROP, ...crop, unit: "%" };
        return {
          unit: "%",
          x: crop.x ? (crop.x / width) * 100 : 0,
          y: crop.y ? (crop.y / height) * 100 : 0,
          width: crop.width ? (crop.width / width) * 100 : 0,
          height: crop.height ? (crop.height / height) * 100 : 0
        };
      }

      function convertToPixelCrop(crop, width, height) {
        if (!crop.unit) return { ...DEFAULT_CROP, ...crop, unit: "px" };
        if (crop.unit === "px") return { ...DEFAULT_CROP, ...crop, unit: "px" };
        return {
          unit: "px",
          x: crop.x ? (crop.x * width) / 100 : 0,
          y: crop.y ? (crop.y * height) / 100 : 0,
          width: crop.width ? (crop.width * width) / 100 : 0,
          height: crop.height ? (crop.height * height) / 100 : 0
        };
      }

        const handleEnhanceDescription = async (section, itemId, currentText) => {
          if (!currentText.trim()) {
            alert("Please enter a description to enhance.");
            return;
          }
          setIsEnhancing(itemId);
          try {
            const response = await fetch("/.netlify/functions/gemini", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                prompt: `Rewrite and enhance the following professional experience description for a resume, making it more impactful, professional, and concise. Focus on action verbs and quantifiable results where possible. Do not add any new information. Keep the response as a single paragraph. Original description: "${currentText}"`
              })
            });
            if (!response.ok) throw new Error("Network response was not ok");
            const data = await response.json();
            const enhancedText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
            if (enhancedText) {
              setResumeData(prev => {
                const list = prev[section].map(item => item.id === itemId ? { ...item, description: enhancedText } : item);
                return { ...prev, [section]: list };
              });
            }
          } catch (e) {
            console.error("AI enhancement failed:", e);
            alert("Failed to enhance description. Please try again.");
          } finally {
            setIsEnhancing(null);
          }
        };

            return { ...prev, [section]: list };
          });

            ...prev,
            [section]: [...prev[section], itemTemplate]
          }));
        };

          }));

          }));

            setCropTarget(target);
            setCrop(undefined);
            const reader = new FileReader();
            reader.addEventListener("load", () => {
              setCropSrc(reader.result?.toString() || "");
            });
            reader.readAsDataURL(e.target.files[0]);
            setShowCropModal(true);
          }
        };

        function onImageLoad(e) {
          imageRef.current = e.currentTarget;
          const { width, height } = e.currentTarget;
          const aspect = cropTarget === "logo" ? 1 : 130 / 140;
          const initialCrop = centerCrop(makeAspectCrop({ unit: "%", width: 90 }, aspect, width, height), width, height);
          setCrop(initialCrop);
          setCompletedCrop(initialCrop);
        }

        const handleCropSave = () => {
          if (!completedCrop || !imageRef.current) return;
          const img = imageRef.current;
          const canvas = document.createElement("canvas");
          const scaleX = img.naturalWidth / img.width;
          const scaleY = img.naturalHeight / img.height;
          canvas.width = completedCrop.width * scaleX;
          canvas.height = completedCrop.height * scaleY;
          const ctx = canvas.getContext("2d");
          if (!ctx) throw new Error("No 2d context");
          const pixelRatio = window.devicePixelRatio;
          canvas.width = completedCrop.width * scaleX * pixelRatio;
          canvas.height = completedCrop.height * scaleY * pixelRatio;
          ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
          ctx.imageSmoothingQuality = "high";
          ctx.drawImage(
            img,
            completedCrop.x * scaleX,
            completedCrop.y * scaleY,
            completedCrop.width * scaleX,
            completedCrop.height * scaleY,
            0,
            0,
            completedCrop.width * scaleX,
            completedCrop.height * scaleY
          );

              personalDetails: { ...prev.personalDetails, [target]: dataUrl }

      const CorporateMinimalEditor = ({ resumeData, setResumeData }) => {
        const [isEnhancing, setIsEnhancing] = useState(null);

        const handlePersonalDetailsChange = (e) => {
          const { name, value } = e.target;
          setResumeData(prev => ({
            ...prev,
            personalDetails: { ...prev.personalDetails, [name]: value }
          }));
        };

        const handleListItemChange = (section, itemId, e) => {
          const { name, value } = e.target;
          setResumeData(prev => {
            const list = prev[section].map(item => item.id === itemId ? { ...item, [name]: value } : item);
            return { ...prev, [section]: list };
          });
        };

        const handleAddListItem = (section, itemTemplate) => {
          setResumeData(prev => ({
            ...prev,
            [section]: [...prev[section], itemTemplate]
          }));
        };

        const handleRemoveListItem = (section, itemId) => {
          setResumeData(prev => ({
            ...prev,
            [section]: prev[section].filter(item => item.id !== itemId)
          }));
        };

        const handleEnhanceDescription = async (section, itemId, currentText) => {
          if (!currentText.trim()) {
            alert("Please enter a description to enhance.");
            return;
          }
          setIsEnhancing(itemId);
          try {
            const response = await fetch("/.netlify/functions/gemini", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                prompt: `Rewrite and enhance the following professional experience description for a resume, making it more impactful, professional, and concise. Focus on action verbs and quantifiable results where possible based on the text. Do not add any new information. Keep the response as a single paragraph. Original description: "${currentText}"`
              })
            });
            if (!response.ok) throw new Error("AI Server Error");
            const data = await response.json();
            const enhancedText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
            if (enhancedText) {
              setResumeData(prev => {
                const list = prev[section].map(item => item.id === itemId ? { ...item, description: enhancedText } : item);
                return { ...prev, [section]: list };
              });
            }
          } catch (e) {
            console.error("AI enhancement failed:", e);
            alert("Failed to enhance the description. Please try again.");
          } finally {
            setIsEnhancing(null);
          }
        };

      function ResumeBuilder({ onBack, initialData, selectedTemplate }) {
        const [resumeData, setResumeData] = useState(() => {
          const uploaded = sessionStorage.getItem('uploadedResumeData');
          if (uploaded) {
            try {
              const data = JSON.parse(uploaded);
              sessionStorage.removeItem('uploadedResumeData');
              return data;
            } catch (e) {
              console.error("Failed to parse uploaded resume data:", e);
            }
          }
          return initialData || (selectedTemplate === "modern-creative" ? MODERN_CREATIVE_SAMPLE_DATA : selectedTemplate === "corporate-minimal" ? CORPORATE_MINIMAL_SAMPLE_DATA : DEFAULT_RESUME_DATA);
        });

        const [isEditorExpanded, setIsEditorExpanded] = useState(true);
        const [zoomLevel, setZoomLevel] = useState(1);
        const [zoomInputVal, setZoomInputVal] = useState("100%");
        const [isDownloading, setIsDownloading] = useState(false);
        const [themeColor, setThemeColor] = useState("#0f172a");
        const [showColorPicker, setShowColorPicker] = useState(false);
        const [showLogoSelectionModal, setShowLogoSelectionModal] = useState(false);
        const [errorMessage, setErrorMessage] = useState(null);

        const resumePreviewRef = useRef(null);
        const photoFileInputRef = useRef(null);
        const logoFileInputRef = useRef(null);
        const errorTimeoutRef = useRef(null);

        useEffect(() => {
          setZoomInputVal(`${Math.round(zoomLevel * 100)}%`);
        }, [zoomLevel]);

        useEffect(() => {
          const isMobile = typeof navigator !== "undefined" && /Mobi|Android|iPhone|iPad|iPod|Windows Phone/.test(navigator.userAgent) || typeof window !== "undefined" && window.innerWidth < 800;
          if (isMobile) {
            setZoomLevel(0.45);
            setZoomInputVal("45%");
          }
        }, []);

        const triggerPhotoUpload = () => photoFileInputRef.current?.click();
        const openLogoSelection = () => setShowLogoSelectionModal(true);
        const selectDefaultLogo = () => {
          const defaultLogo = "assets/images/NITTLogo.png";
          setResumeData(prev => ({
            ...prev,
            personalDetails: { ...prev.personalDetails, logo: defaultLogo }
          }));
          setShowLogoSelectionModal(false);
        };
        const triggerLogoUpload = () => {
          logoFileInputRef.current?.click();
          setShowLogoSelectionModal(false);
        };

        const validateUploads = () => {
          const isPhotoPlaceholder = isPlaceholderImage(resumeData.personalDetails.photo);
          const isLogoPlaceholder = isPlaceholderImage(resumeData.personalDetails.logo);
          if (selectedTemplate === "on-campus") {
            if (isPhotoPlaceholder && isLogoPlaceholder) return "Please upload a profile photo and the institute logo before downloading.";
            if (isPhotoPlaceholder) return "Please upload a profile photo before downloading.";
            if (isLogoPlaceholder) return "Please upload the institute logo before downloading.";
          } else if (selectedTemplate === "modern-creative" && isPhotoPlaceholder) {
            return "Please upload a profile photo before downloading.";
          }
          return null;
        };

        const showBannerError = (msg) => {
          if (errorTimeoutRef.current) clearTimeout(errorTimeoutRef.current);
          setErrorMessage(msg);
          errorTimeoutRef.current = window.setTimeout(() => {
            setErrorMessage(null);
            errorTimeoutRef.current = null;
          }, 6000);
        };

        const handleDownloadPdf = async () => {
          const validationError = validateUploads();
          if (validationError) {
            showBannerError(validationError);
            return;
          }

          const previewEl = resumePreviewRef.current?.getHtmlForPdf();
          if (!previewEl) {
            console.error("Resume container not found for PDF generation.");
            showBannerError("Could not generate PDF. Please try again.");
            return;
          }

          const pages = previewEl.querySelectorAll(".resume-page-container");
          if (pages.length === 0) {
            console.error("No pages found to download.");
            showBannerError("There is no content to download as a PDF.");
            return;
          }

          setIsDownloading(true);
          try {
            const doc = new jspdf.jsPDF({
              orientation: "portrait",
              unit: "mm",
              format: "a4"
            });

            let customStyleTag = null;
            const fontStyleId = "pdf-generation-fonts";
            const existingStyle = document.getElementById(fontStyleId);
            if (existingStyle) existingStyle.remove();

            const loadFontAsBase64 = async (url) => {
              try {
                const response = await fetch(url);
                if (!response.ok) return null;
                const blob = await response.blob();
                if (blob.size === 0) return null;
                return new Promise((resolve, reject) => {
                  const reader = new FileReader();
                  reader.onloadend = () => {
                    const base64data = reader.result;
                    resolve(base64data.split(",")[1]);
                  };
                  reader.onerror = reject;
                  reader.readAsDataURL(blob);
                });
              } catch {
                return null;
              }
            };

            let baseRegular, baseBold, baseCambria;
            try {
              baseRegular = await loadFontAsBase64("https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/lato/Lato-Regular.ttf");
              baseBold = await loadFontAsBase64("https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/lato/Lato-Bold.ttf");
            } catch (e) {
              console.error("Lato font VFS loading failed:", e);
            }
            try {
              baseCambria = await loadFontAsBase64("https://cdn.jsdelivr.net/gh/serendipious/every-font@master/Cambria%20-%20Regular.ttf");
            } catch (e) {
              console.error("Cambria font VFS loading failed:", e);
            }

            if (baseRegular) {
              doc.addFileToVFS("Lato-Regular.ttf", baseRegular);
              doc.addFont("Lato-Regular.ttf", "Lato", "normal");
              doc.addFont("Lato-Regular.ttf", "Lato", "400");
            }
            if (baseBold) {
              doc.addFileToVFS("Lato-Bold.ttf", baseBold);
              doc.addFont("Lato-Bold.ttf", "Lato", "bold");
              doc.addFont("Lato-Bold.ttf", "Lato", "700");
            }
            if (baseCambria) {
              doc.addFileToVFS("Cambria.ttf", baseCambria);
              doc.addFont("Cambria.ttf", "Cambria", "normal");
              doc.addFont("Cambria.ttf", "Cambria", "400");
            }

            customStyleTag = document.createElement("style");
            customStyleTag.id = fontStyleId;
            let cssText = "";
            if (baseRegular) {
              cssText += `
                @font-face {
                  font-family: 'Lato';
                  src: url(data:font/ttf;base64,${baseRegular}) format('truetype');
                  font-weight: normal;
                  font-style: normal;
                }
                @font-face {
                  font-family: 'Lato';
                  src: url(data:font/ttf;base64,${baseRegular}) format('truetype');
                  font-weight: 400;
                  font-style: normal;
                }
              `;
            }
            if (baseBold) {
              cssText += `
                @font-face {
                  font-family: 'Lato';
                  src: url(data:font/ttf;base64,${baseBold}) format('truetype');
                  font-weight: bold;
                  font-style: normal;
                }
                @font-face {
                  font-family: 'Lato';
                  src: url(data:font/ttf;base64,${baseBold}) format('truetype');
                  font-weight: 700;
                  font-style: normal;
                }
              `;
            }
            if (baseCambria) {
              cssText += `
                @font-face {
                  font-family: 'Cambria';
                  src: url(data:font/ttf;base64,${baseCambria}) format('truetype');
                  font-weight: normal;
                  font-style: normal;
                }
              `;
            }

            let styleOverrides = `
              .section-header-flex {
                align-items: flex-end !important;
              }
              .section-header-line {
                margin-bottom: 4px !important;
              }
              .resume-section-container {
                margin-bottom: 1.1rem !important;
              }
              .custom-square-list li::before {
                width: 3px !important;
                height: 3px !important;
                top: 0.6em !important;
              }
            `;

            if (selectedTemplate === "modern-creative") {
              styleOverrides += `
                .modern-creative-skill-tag {
                  position: relative;
                  top: -5px;
                }
                .modern-creative-date {
                  position: relative;
                  top: -2px;
                }
                .modern-creative-contact-icon {
                  position: relative;
                  top: 4px;
                }
                .modern-creative-section-border {
                  position: relative;
                  top: 3px;
                }
              `;
            } else if (selectedTemplate === "corporate-minimal") {
              styleOverrides += `
                .corporate-minimal-list-item::before {
                  top: 15px !important;
                }
              `;
            }

            customStyleTag.innerHTML = cssText + styleOverrides;
            document.head.appendChild(customStyleTag);

            if (baseRegular) {
              doc.setFont("Lato", "normal");
            }

            const isMobile = /Mobi|Android|iPhone|iPad|iPod|Windows Phone/.test(navigator.userAgent) || window.innerWidth < 800;
            let wasFallbackUsed = false;

            for (let i = 0; i < pages.length; i++) {
              const pageEl = pages[i];
              const uploadButtons = pageEl.parentElement?.querySelectorAll('button[aria-label^="Upload"]');
              if (uploadButtons) {
                uploadButtons.forEach(btn => btn.style.visibility = "hidden");
              }

              if (isMobile) {
                try {
                  if (i > 0) doc.addPage();
                  await doc.html(pageEl, {
                    callback: () => {},
                    x: 0, y: 0, width: 210, windowWidth: 794,
                    html2canvas: { scale: 0.26458, useCORS: true, logging: false, letterRendering: false, allowTaint: true },
                    autoPaging: false
                  });
                  wasFallbackUsed = true;
                } catch (err) {
                  console.warn("pdf.html failed on mobile, falling back to html2canvas rendering", err);
                  const clone = pageEl.cloneNode(true);
                  clone.querySelectorAll('button[aria-label^="Upload"]').forEach(btn => btn.style.visibility = "hidden");
                  const devW = 794;
                  const devH = 1122;
                  const tempContainer = document.createElement("div");
                  tempContainer.style.position = "absolute";
                  tempContainer.style.left = "-9999px";
                  tempContainer.style.top = "0";
                  tempContainer.style.width = `${devW}px`;
                  tempContainer.style.height = `${devH}px`;
                  tempContainer.style.overflow = "visible";
                  tempContainer.appendChild(clone);
                  document.body.appendChild(tempContainer);

                  try {
                    const canvas = await html2canvas(tempContainer, {
                      scale: 2, useCORS: true, logging: false, letterRendering: false, allowTaint: true,
                      width: devW, height: devH, windowWidth: devW, windowHeight: devH
                    });
                    const imgData = canvas.toDataURL("image/png", 1);
                    if (i > 0) doc.addPage();
                    doc.addImage(imgData, "PNG", 0, 0, 210, 297);
                  } catch (canvasErr) {
                    console.error("html2canvas fallback failed", canvasErr);
                    showBannerError("Could not render page for PDF. Please try again.");
                  } finally {
                    if (tempContainer.parentElement) document.body.removeChild(tempContainer);
                    if (uploadButtons) {
                      uploadButtons.forEach(btn => btn.style.visibility = "visible");
                    }
                  }
                }
              } else {
                if (i > 0) doc.addPage();
                try {
                  await doc.html(pageEl, {
                    callback: () => {},
                    x: 0, y: 0, width: 210, windowWidth: 794,
                    html2canvas: { scale: 0.26458, useCORS: true, logging: false, letterRendering: false, allowTaint: true },
                    autoPaging: false
                  });
                } catch (err) {
                  console.error("pdf.html error", err);
                  showBannerError("Could not render page for PDF. Please try again.");
                } finally {
                  if (uploadButtons) {
                    uploadButtons.forEach(btn => btn.style.visibility = "visible");
                  }
                }
              }
            }

            if (customStyleTag) customStyleTag.remove();

            if ((!isMobile || (isMobile && wasFallbackUsed)) && doc.getNumberOfPages() > 1) {
              try {
                // Delete empty first page if generated accidentally
                doc.deletePage(1);
              } catch (delErr) {
                console.warn("Could not delete first PDF page:", delErr);
              }
            }

            doc.save(`${resumeData.personalDetails.name.replace(/\s/g, "_")}_Resume.pdf`);
          } catch (e) {
            console.error("PDF Generation failed", e);
            showBannerError(e.message || "An error occurred while generating the PDF.");
          } finally {
            setIsDownloading(false);
          }
        };

        const handleZoomInputChange = (e) => setZoomInputVal(e.target.value);

        const applyZoomInput = () => {
          let val = parseFloat(zoomInputVal.replace(/%/g, "").trim());
          if (isNaN(val)) {
            setZoomInputVal(`${Math.round(zoomLevel * 100)}%`);
          } else {
            val = Math.max(20, Math.min(500, val));
            setZoomLevel(val / 100);
          }
        };

        const handleZoomInputBlur = () => applyZoomInput();

        const handleZoomInputKeyDown = (e) => {
          if (e.key === "Enter") {
            applyZoomInput();
            e.target.blur();
          } else if (e.key === "Escape") {
            setZoomInputVal(`${Math.round(zoomLevel * 100)}%`);
            e.target.blur();
          }
        };

        return jsxs("div", {
          className: "flex h-screen bg-gray-200 overflow-hidden",
          children: [
            /* --- Sidebar layout container --- */
            jsx("aside", {
              className: `transition-all duration-300 ease-in-out bg-white shadow-lg flex-shrink-0 relative ${isEditorExpanded ? "w-full md:w-[500px]" : "w-0"} overflow-hidden`,
              children: jsx("div", {
                className: "h-screen overflow-y-auto",
                children: selectedTemplate === "on-campus" ? jsx(OnCampusEditor, {
                  resumeData, setResumeData, photoFileInputRef, logoFileInputRef
                }) : selectedTemplate === "modern-creative" ? jsx(ModernCreativeEditor, {
                  resumeData, setResumeData, photoFileInputRef, logoFileInputRef
                }) : jsx(CorporateMinimalEditor, {
                  resumeData, setResumeData
                })
              })
            }),

            /* --- Main live preview pane --- */
            jsxs("main", {
              className: "flex-1 p-4 sm:p-6 md:p-8 overflow-y-auto flex flex-col items-center",
              children: [
                /* --- Action toolbar --- */
                jsxs("div", {
                  className: "mb-4 bg-white p-1 sm:p-2 rounded-md sm:rounded-lg shadow-md flex items-center space-x-2 sticky top-0 z-10",
                  children: [
                    jsxs("button", {
                      onClick: onBack,
                      className: "h-7 sm:h-8 px-2 sm:px-3 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm flex items-center justify-center space-x-1.5 mr-2",
                      title: "Back",
                      children: [
                        jsx("svg", {
                          xmlns: "http://www.w3.org/2000/svg", className: "h-3.5 w-3.5 sm:h-4 sm:w-4", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor", strokeWidth: 2,
                          children: jsx("path", { strokeLinecap: "round", strokeLinejoin: "round", d: "M10 19l-7-7m0 0l7-7m-7 7h18" })
                        }),
                        jsx("span", { children: "Back" })
                      ]
                    }),
                    jsx("div", { className: "h-8 w-px bg-gray-200 mx-2" }),
                    jsx("button", { onClick: () => setZoomLevel(z => Math.max(0.2, z - 0.1)), className: "h-7 sm:h-8 px-2 sm:px-3 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 font-bold flex items-center justify-center", children: "-" }),
                    jsx("button", { onClick: () => setZoomLevel(1), className: "h-7 sm:h-8 px-2 sm:px-3 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm flex items-center justify-center", children: "Reset" }),
                    jsx("button", { onClick: () => setZoomLevel(z => z + 0.1), className: "h-7 sm:h-8 px-2 sm:px-3 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 font-bold flex items-center justify-center", children: "+" }),
                    jsx("input", {
                      type: "text", value: zoomInputVal, onChange: handleZoomInputChange, onBlur: handleZoomInputBlur, onKeyDown: handleZoomInputKeyDown,
                      className: "h-7 sm:h-8 text-sm text-gray-600 w-14 sm:w-16 text-center bg-gray-50 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500",
                      "aria-label": "Zoom percentage"
                    }),

                    /* --- Color picker for Modern layout only --- */
                    selectedTemplate === "modern-creative" && jsxs("div", {
                      className: "relative ml-2",
                      children: [
                        jsx("button", {
                          onClick: () => setShowColorPicker(!showColorPicker),
                          className: "w-7 h-7 sm:w-8 sm:h-8 rounded-full border-2 border-white shadow-sm focus:outline-none ring-1 ring-gray-300 transition-transform hover:scale-105",
                          style: { backgroundColor: themeColor },
                          title: "Change Base Color", "aria-label": "Change Color"
                        }),
                        showColorPicker && jsxs(Fragment, {
                          children: [
                            jsx("div", { className: "fixed inset-0 z-10", onClick: () => setShowColorPicker(false) }),
                            jsx("div", {
                              className: "absolute top-full mt-3 left-1/2 -translate-x-1/2 bg-white p-3 rounded-xl shadow-xl border border-gray-100 flex gap-2 z-20 animate-fade-in",
                              children: THEME_COLOR_OPTIONS.map(opt => jsx("button", {
                                onClick: () => { setThemeColor(opt.hex); setShowColorPicker(false); },
                                className: "w-8 h-8 rounded-full hover:scale-110 transition-transform ring-1 ring-gray-200 border-2 border-white shadow-sm",
                                style: { backgroundColor: opt.hex }, title: opt.name
                              }, opt.name))
                            })
                          ]
                        })
                      ]
                    }),

                    /* --- PDF Generation Button --- */
                    jsxs("button", {
                      onClick: handleDownloadPdf,
                      disabled: isDownloading,
                      className: `h-7 sm:h-8 px-2 sm:px-3 text-white rounded text-sm flex items-center justify-center space-x-1.5 ml-2 transition-colors ${
                        isDownloading ? "bg-green-400 cursor-wait" : "bg-green-500 hover:bg-green-600"
                      }`,
                      children: [
                        isDownloading ? jsxs("svg", {
                          className: "animate-spin h-3.5 w-3.5 sm:h-4 sm:w-4 text-white", xmlns: "http://www.w3.org/2000/svg", fill: "none", viewBox: "0 0 24 24",
                          children: [
                            jsx("circle", { className: "opacity-25", cx: "12", cy: "12", r: "10", stroke: "currentColor", strokeWidth: "4" }),
                            jsx("path", { className: "opacity-75", fill: "currentColor", d: "M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" })
                          ]
                        }) : jsx("svg", {
                          xmlns: "http://www.w3.org/2000/svg", className: "h-3.5 w-3.5 sm:h-4 sm:w-4", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor", strokeWidth: 2,
                          children: jsx("path", { strokeLinecap: "round", strokeLinejoin: "round", d: "M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" })
                        }),
                        jsx("span", { children: isDownloading ? "Generating..." : "PDF" })
                      ]
                    })
                  ]
                }),

                /* --- Scalable Preview Container --- */
                jsx("div", {
                  style: { transform: `scale(${zoomLevel})`, transformOrigin: "top" },
                  className: "transition-transform duration-200",
                  children: selectedTemplate === "on-campus" ? jsx(OnCampusPreview, {
                    ref: resumePreviewRef, resumeData, onPhotoUploadClick: triggerPhotoUpload, onLogoUploadClick: openLogoSelection
                  }) : selectedTemplate === "modern-creative" ? jsx(ModernCreativePreview, {
                    ref: resumePreviewRef, resumeData, themeColor, onPhotoUploadClick: triggerPhotoUpload, isDownloading
                  }) : jsx(CorporateMinimalPreview, {
                    ref: resumePreviewRef, resumeData
                  })
                })
              ]
            }),

            /* --- Drawer Toggle Buttons --- */
            !isEditorExpanded && jsx("button", {
              onClick: () => setIsEditorExpanded(true),
              className: "fixed left-0 top-1/2 -translate-y-1/2 z-30 bg-blue-600 text-white rounded-r-lg px-2 py-4 shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-300 ease-in-out",
              "aria-label": "Show Editor",
              children: jsx("svg", { xmlns: "http://www.w3.org/2000/svg", className: "h-6 w-6", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor", strokeWidth: 2, children: jsx("path", { strokeLinecap: "round", strokeLinejoin: "round", d: "M9 5l7 7-7 7" }) })
            }),
            isEditorExpanded && jsx("button", {
              onClick: () => setIsEditorExpanded(false),
              className: "fixed top-1/2 -translate-y-1/2 z-30 bg-blue-600 text-white rounded-l-lg px-2 py-4 shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-300 ease-in-out left-full md:left-[500px] -translate-x-full",
              "aria-label": "Hide Editor",
              children: jsx("svg", { xmlns: "http://www.w3.org/2000/svg", className: "h-6 w-6", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor", strokeWidth: 2, children: jsx("path", { strokeLinecap: "round", strokeLinejoin: "round", d: "M15 19l-7-7 7-7" }) })
            }),

            /* --- Error message banner --- */
            errorMessage && jsxs("div", {
              className: "fixed bottom-10 left-1/2 -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-fade-in flex items-center gap-3",
              children: [
                jsx("svg", {
                  xmlns: "http://www.w3.org/2000/svg", className: "h-6 w-6", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor",
                  children: jsx("path", { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" })
                }),
                jsx("span", { children: errorMessage })
              ]
            }),

            /* --- Logo Upload / Select Choice Dialog --- */
            showLogoSelectionModal && jsx("div", {
              className: "fixed inset-0 z-[60] flex items-center justify-center p-4",
              children: jsxs("div", {
                className: "bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm transform transition-all scale-100 border border-gray-200",
                children: [
                  jsx("h3", { className: "text-xl font-bold text-gray-900 mb-6 text-center", children: "Select Institute Logo" }),
                  jsxs("div", {
                    className: "space-y-3",
                    children: [
                      jsx("button", {
                        onClick: selectDefaultLogo,
                        className: "w-full flex items-center justify-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-lg font-semibold transition-colors border border-blue-200",
                        children: "NITT Logo"
                      }),
                      jsxs("div", {
                        className: "relative",
                        children: [
                          jsx("div", { className: "absolute inset-0 flex items-center", children: jsx("div", { className: "w-full border-t border-gray-200" }) }),
                          jsx("div", { className: "relative flex justify-center text-sm", children: jsx("span", { className: "px-2 bg-white text-gray-500", children: "Or" }) })
                        ]
                      }),
                      jsxs("button", {
                        onClick: triggerLogoUpload,
                        className: "w-full flex items-center justify-center gap-3 px-4 py-3 bg-white text-gray-700 hover:bg-gray-50 rounded-lg font-semibold transition-colors border border-gray-300",
                        children: [
                          jsx("svg", {
                            xmlns: "http://www.w3.org/2000/svg", className: "h-5 w-5 text-gray-400", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor",
                            children: jsx("path", { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" })
                          }),
                          "Upload Logo"
                        ]
                      })
                    ]
                  }),
                  jsx("button", { onClick: () => setShowLogoSelectionModal(false), className: "mt-6 w-full text-center text-gray-400 hover:text-gray-600 text-sm font-medium", children: "Cancel" })
                ]
              })
            })
          ]
        });
      }

      /* --- Mount --- */
      const rootElement = document.getElementById('root');
      const root = createRoot(rootElement);
      const urlParams = new URLSearchParams(window.location.search);
      const selectedTemplate = urlParams.get('template') || 'on-campus';

      const handleBack = () => {
        window.location.href = '/templates.html';
      };

      root.render(
        jsx(React.StrictMode, {
          children: jsx(ResumeBuilder, {
            onBack: handleBack,
            selectedTemplate: selectedTemplate
          })
        })
      );
    </script>
  </body>
</html>

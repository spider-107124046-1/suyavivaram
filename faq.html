<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frequently Asked Questions - Resumify</title>
    <meta name="description" content="Get answers to common questions about Resumify, data privacy, PDF generation, and saving your resume progress." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/shared.css" />
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@19.2.0/",
          "react": "https://esm.sh/react@19.2.0",
          "react-dom/": "https://esm.sh/react-dom@19.2.0/"
        }
      }
    </script>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="module">
      import { jsx, jsxs } from 'react/jsx-runtime';
      import React, { useState } from 'react';
      import { createRoot } from 'react-dom/client';

      /* ============================================================
       *  COMPONENT: FAQItem
       *  An accordion FAQ item.
       * ============================================================ */
      const FAQItem = ({ question, answer }) => {
        const [isOpen, setIsOpen] = useState(false);

        return jsxs('div', {
          className: `bg-white/60 backdrop-blur-sm rounded-2xl border border-slate-100 shadow-sm transition-all duration-300 ${
            isOpen ? 'bg-white/90 ring-1 ring-slate-200 shadow-md' : 'hover:bg-white/70'
          }`,
          children: [
            jsxs('button', {
              onClick: () => setIsOpen(!isOpen),
              className: 'w-full text-left p-6 flex justify-between items-center focus:outline-none group',
              children: [
                jsx('h3', {
                  className: `text-lg font-bold pr-8 transition-colors ${
                    isOpen ? 'text-blue-600' : 'text-slate-900 group-hover:text-slate-800'
                  }`,
                  children: question
                }),
                jsx('div', {
                  className: `flex-shrink-0 ml-4 p-2 rounded-full transition-all duration-300 ${
                    isOpen ? 'bg-blue-100 text-blue-600 rotate-180' : 'bg-slate-100 text-slate-500 group-hover:bg-slate-200'
                  }`,
                  children: jsx('svg', {
                    xmlns: 'http://www.w3.org/2000/svg', className: 'h-5 w-5', fill: 'none',
                    viewBox: '0 0 24 24', stroke: 'currentColor',
                    children: jsx('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2.5, d: 'M19 9l-7 7-7-7' })
                  })
                })
              ]
            }),
            jsx('div', {
              className: `overflow-hidden transition-all duration-300 ease-in-out ${
                isOpen ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'
              }`,
              children: jsx('div', {
                className: 'px-6 pb-6 text-slate-600 leading-relaxed border-t border-slate-100/50 pt-4',
                children: answer
              })
            })
          ]
        });
      };

      /* ============================================================
       *  COMPONENT: FAQPage
       *  Renders the list of FAQItems and a back button.
       * ============================================================ */
      const FAQPage = () => {
        const navigateBack = () => { window.location.href = '/'; };

        const faqs = [
          {
            q: 'Is Resumify free to use?',
            a: 'Yes, Resumify is a completely free and open-source tool designed to help students generate professional resumes without any cost.'
          },
          {
            q: 'Do I need to create an account or sign in?',
            a: "No. We use a secure 'Stateless' architecture. You do not need to share your email, create a password, or log in. You can start building your resume immediately."
          },
          {
            q: 'Do you store my personal data or uploaded photos?',
            a: "Absolutely not. Your data lives only in your browser while you are typing. When you click 'Download', the data is sent to our server solely to generate the PDF file and is immediately wiped from memory. We do not have a database."
          },
          {
            q: 'Can I save my progress and come back later?',
            a: 'Since we value privacy and do not store your data, closing the browser tab will result in losing your progress. We recommend keeping the tab open until you have downloaded the final PDF.'
          },
          {
            q: 'Why does the download take a few seconds?',
            a: 'Unlike basic tools that take a screenshot, Resumify spins up a real, high-fidelity browser engine on our server to ensure your margins, fonts, and layout are pixel-perfect. This high-quality rendering takes about 2-5 seconds.'
          },
          {
            q: 'Why did I get a \'Timeout\' error when downloading?',
            a: 'This usually happens if your Profile Photo or Institute Logo is extremely large (e.g., over 5MB). The server takes too long to process and download huge images. Please try compressing your images and uploading them again.'
          },
          {
            q: 'Why does my resume have 3 pages instead of 2?',
            a: 'Our automated layout engine ensures text is never cut in half. If your content is slightly too long for 2 pages, it will push the excess content to a 3rd page. We recommend shortening your project descriptions or bullet points to fit the standard 2-page limit.'
          }
        ];

        return jsxs('div', {
          className: 'relative min-h-screen bg-white overflow-hidden font-sans selection:bg-teal-100 flex flex-col',
          children: [
            /* Background Blobs */
            jsx('div', { className: 'absolute top-[-10%] left-[-5%] w-[50vw] h-[50vw] bg-[#FDF6B2] rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob' }),
            jsx('div', { className: 'absolute top-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-[#99F6E4] rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob animation-delay-2000' }),
            jsx('div', { className: 'absolute bottom-[-20%] left-[10%] w-[50vw] h-[50vw] bg-[#FF7E67] rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-4000' }),

            /* Main Container */
            jsxs('div', {
              className: 'relative z-10 flex-grow flex flex-col p-6 md:p-12 max-w-4xl mx-auto w-full',
              children: [
                /* Back Button */
                jsx('div', {
                  className: 'w-full mb-8',
                  children: jsxs('button', {
                    onClick: navigateBack,
                    className: 'flex items-center text-slate-600 hover:text-slate-900 transition-colors font-medium',
                    children: [
                      jsx('svg', {
                        xmlns: 'http://www.w3.org/2000/svg', className: 'h-5 w-5 mr-2', fill: 'none',
                        viewBox: '0 0 24 24', stroke: 'currentColor',
                        children: jsx('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M10 19l-7-7m0 0l7-7m-7 7h18' })
                      }),
                      'Back'
                    ]
                  })
                }),

                /* Title */
                jsx('h1', {
                  className: 'text-4xl font-extrabold text-slate-900 mb-10 tracking-tight text-center',
                  children: 'Frequently Asked Questions'
                }),

                /* Accordion List */
                jsx('div', {
                  className: 'space-y-4 overflow-y-auto pb-10',
                  children: faqs.map((faq, index) => jsx(FAQItem, { question: faq.q, answer: faq.a }, index))
                })
              ]
            })
          ]
        });
      };

      /* --- Mount --- */
      const rootElement = document.getElementById('root');
      const root = createRoot(rootElement);
      root.render(jsx(React.StrictMode, { children: jsx(FAQPage, {}) }));
    </script>
  </body>
</html>

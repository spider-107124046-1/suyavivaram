<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Resume - Resumify</title>
    <meta name="description" content="Upload your existing PDF resume to extract and enhance it with AI." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/shared.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@19.2.0/",
          "react": "https://esm.sh/react@19.2.0",
          "react-dom/": "https://esm.sh/react-dom@19.2.0/"
        }
      }
    </script>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="module">
      import { jsx, jsxs, Fragment } from 'react/jsx-runtime';
      import React, { useState, useRef } from 'react';
      import { createRoot } from 'react-dom/client';

      /* ============================================================
       *  DEFAULT_RESUME_DATA
       *  Shared default structure when parsing fails or starting empty.
       * ============================================================ */
      const DEFAULT_RESUME_DATA = {
        personalDetails: {
          name: "JOHN DOE",
          photo: "assets/images/placeholder.png",
          degree: "B.Tech - Computer Science and Engineering",
          gender: "Male",
          dob: "06/09/2005",
          email: "tp@nitt.edu",
          contact: "+91-431-2501081",
          logo: "assets/images/placeholder.png",
          linkedin: "",
          github: ""
        },
        summary: "",
        education: [
          { id: "edu1", year: "2023-Present", degree: "B.Tech- CSE", institution: "NIT, Trichy", grade: "9.2" },
          { id: "edu2", year: "2023", degree: "Class XII", institution: "Delhi Public School, R. K. Puram", grade: "97.2%" },
          { id: "edu3", year: "2021", degree: "Class X", institution: "Delhi Public School, R. K. Puram", grade: "98.8%" }
        ],
        internships: [
          { id: "int1", title: "Research Internship at Indian Institute of Technology Guwahati", date: "Jun 2025 - Present", description: "Working as a research intern on the project Air to Water Generator. I simulated a model in Dymola to extract water from humid air with the purpose of satisfying water requirements in coastal regions." },
          { id: "int2", title: "Internship at AHODS Technologies Private Limited", date: "Jun 2025 - Aug 2025", description: "Collaborated with IIT Delhi on a project to enhance onboard hydrogen production for vehicles. Conducted a literature review on electrolysis methods to propose cost-effective solutions." }
        ],
        achievements: [
          { id: "ach1", description: "Secured <b>Rank 2</b> in Cyber Olympiad(IFCO) in the Zonal level conducted by International Olympiad Foundation in 2022." },
          { id: "ach2", description: "Achieved <b>Top 5%</b> in the national competitive programming contest CodeSprint 2023." },
          { id: "ach3", description: "<b>IBPC Meritorious Student Award</b> in 2021 and 2023." }
        ],
        projects: [
          { id: "proj1", name: "Smart Inventory System", date: "January 2025 - March 2025", description: "Designed and deployed a comprehensive inventory management system using the MERN stack to streamline stock tracking for local businesses. Implemented real-time data visualization dashboards using Chart.js to analyze sales trends and predict future stock requirements with 95% accuracy." },
          { id: "proj2", name: "Weather App", date: "May 2025", description: "Developed a Weather App that displays the weather of 3 cities on the home page. It also displays the weather of any city searched for in the search box. It displays temperature, feels like temperature, humidity, and wind speed. The front end is made using HTML, CSS, and JavaScript. The API used to get weather data is Weather API by WeatherAPI.com." },
          { id: "proj3", name: "Chatty", date: "June 2025", description: "Built Chatty, a real-time chat application with one-on-one messaging and online status, using the MERN stack with Socket.io, JWT for security, and Zustand for state management. Optimized database queries and implemented a caching layer, improving message delivery speed by 30%." }
        ],
        skills: [
          { id: "skill1", category: "Programming Languages", skills: "C++, C, JavaScript, HTML, CSS" },
          { id: "skill2", category: "Frameworks/Libraries", skills: "React.js, Socket.io" },
          { id: "skill3", category: "Tools", skills: "Visual Studio Code, Git, GitHub, Node.js" },
          { id: "skill4", category: "Other Softwares", skills: "Figma, Photoshop" }
        ],
        positions: [
          { id: "pos1", title: "Associate, The Product Folks NITT", date: "May 2025-Present", description: "As a member of the Product Management Club of NIT Trichy, I take part in upskilling sessions and work on case studies, projects, and product decks." },
          { id: "pos2", title: "Manager, Marketing, Festember", date: "Mar 2024 - Present", description: "Worked as a Marketing Manager of Festember'24, the annual cultural festival of NIT Trichy. Executed the task of establishing partnerships with various companies through effective communication and negotiation strategies." }
        ],
        activities: [
          { id: "act1", title: "Social Activities", description: "A volunteer under the HumaNITTy programme, NIT Trichy chapter, which aims at visiting local old age homes and orphanages and spending quality time with them.\nOrganized a campus-wide blood donation camp in collaboration with the Red Cross Society, collecting over 200 units of blood." },
          { id: "act2", title: "Cultural Activities", description: "Secured 1st position in Pixel Pirates event of Pragyan in 2023.\nDAN 1 - Black Belt Holder in Karate" },
          { id: "act3", title: "Sports Activities", description: "Participated in 10K sportsfete marathon" }
        ],
        languages: [],
        webLinks: [],
        coursework: [],
        technicalAchievements: []
      };

      const generateUniqueId = () => {
        if (typeof crypto !== "undefined" && crypto.randomUUID) {
          try { return crypto.randomUUID(); } catch {}
        }
        return Date.now().toString(36) + Math.random().toString(36).substring(2);
      };

      /* ============================================================
       *  COMPONENT: ResumeUploadPage
       *  Parses PDF text locally, calls the Netlify function for AI mapping,
       *  saves the results to sessionStorage, and redirects to the builder.
       * ============================================================ */
      const ResumeUploadPage = () => {
        const [isAnalyzing, setIsAnalyzing] = useState(false);
        const [isDragging, setIsDragging] = useState(false);
        const fileInputRef = useRef(null);

        const navigateBack = () => { window.location.href = '/start.html'; };

        const handleDrag = (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (e.type === "dragenter" || e.type === "dragover") {
            setIsDragging(true);
          } else if (e.type === "dragleave") {
            setIsDragging(false);
          }
        };

        const handleDrop = (e) => {
          e.preventDefault();
          e.stopPropagation();
          setIsDragging(false);
          if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            processFile(e.dataTransfer.files[0]);
          }
        };

        const handleFileChange = (e) => {
          e.preventDefault();
          if (e.target.files && e.target.files[0]) {
            processFile(e.target.files[0]);
          }
        };

        const processFile = async (file) => {
          if (file.type !== "application/pdf") {
            alert("Please upload a valid PDF file.");
            return;
          }
          setIsAnalyzing(true);
          try {
            const pdfjs = window.pdfjsLib;
            if (!pdfjs) throw new Error("PDF processing library not loaded. Please check your internet connection.");

            const fileBuffer = await file.arrayBuffer();
            const pdfDocument = await pdfjs.getDocument(fileBuffer).promise;
            let extractedText = "";

            for (let pageNum = 1; pageNum <= pdfDocument.numPages; pageNum++) {
              const page = await pdfDocument.getPage(pageNum);
              const textContent = await page.getTextContent();
              const pageText = textContent.items.map(item => item.str).join('\n');
              extractedText += `--- Page ${pageNum} ---\n${pageText}\n`;
            }

            if (!extractedText.trim() || extractedText.replace(/--- Page \d+ ---/g, "").trim().length < 50) {
              throw new Error("Could not extract text from this PDF. It might be a scanned image or password protected. Please try a different file.");
            }

            const response = await fetch("/.netlify/functions/parse-resume", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: extractedText })
            });

            if (!response.ok) throw new Error("Failed to communicate with AI server");

            const aiResponseData = await response.json();

            // Helper to map list arrays and inject generated IDs
            const mapListItems = (list) => {
              return (list?.map(item => ({
                ...item,
                id: generateUniqueId(),
                description: item.description || "",
                title: item.title || "",
                name: item.name || "",
                date: item.date || "",
                institution: item.institution || "",
                grade: item.grade || "",
                year: item.year || "",
                degree: item.degree || "",
                skills: item.skills || "",
                category: item.category || "",
                language: item.language || "",
                proficiency: item.proficiency || "",
                url: item.url || "",
                rank: item.rank || "",
                event: item.event || "",
                subjects: item.subjects || ""
              }))) || [];
            };

            // Process activities specifically
            const activityCategories = ["Social Activities", "Cultural Activities", "Sports Activities"];
            const mappedActivities = activityCategories.map(category => {
              const exactMatch = aiResponseData.activities?.find(act => act.title === category);
              const fuzzyMatch = exactMatch || aiResponseData.activities?.find(act =>
                act.title?.toLowerCase().includes(category.split(" ")[0].toLowerCase())
              );
              return {
                id: generateUniqueId(),
                title: category,
                description: fuzzyMatch?.description || ""
              };
            });

            const extracurricularSection = aiResponseData.activities?.find(act =>
              act.title?.toLowerCase().includes("extra")
            );
            if (extracurricularSection) {
              mappedActivities.push({
                id: generateUniqueId(),
                title: "EXTRACURRICULAR ACTIVITIES",
                description: extracurricularSection.description
              });
            }

            // Build full structure matching DEFAULT_RESUME_DATA layout
            const completeResumeData = {
              ...DEFAULT_RESUME_DATA,
              personalDetails: {
                ...DEFAULT_RESUME_DATA.personalDetails,
                ...aiResponseData.personalDetails,
                photo: DEFAULT_RESUME_DATA.personalDetails.photo,
                logo: DEFAULT_RESUME_DATA.personalDetails.logo,
                linkedin: aiResponseData.personalDetails?.linkedin || "",
                github: aiResponseData.personalDetails?.github || ""
              },
              summary: aiResponseData.summary || "",
              education: mapListItems(aiResponseData.education),
              internships: mapListItems(aiResponseData.internships),
              projects: mapListItems(aiResponseData.projects),
              achievements: mapListItems(aiResponseData.achievements),
              skills: mapListItems(aiResponseData.skills),
              positions: mapListItems(aiResponseData.positions),
              activities: mappedActivities,
              languages: mapListItems(aiResponseData.languages),
              webLinks: mapListItems(aiResponseData.webLinks),
              coursework: mapListItems(aiResponseData.coursework),
              technicalAchievements: mapListItems(aiResponseData.technicalAchievements)
            };

            // Store in sessionStorage and redirect to builder
            sessionStorage.setItem('uploadedResumeData', JSON.stringify(completeResumeData));
            window.location.href = '/builder.html?template=on-campus';

          } catch (error) {
            console.error("Error processing resume:", error);
            alert(`Error: ${error.message || "Failed to process the resume."}`);
          } finally {
            setIsAnalyzing(false);
          }
        };

        return jsxs('div', {
          className: 'min-h-screen bg-gray-50 flex flex-col relative',
          children: [
            /* Animated Blobs */
            jsx('div', { className: 'fixed top-[-10%] left-[-5%] w-[50vw] h-[50vw] bg-[#FDF6B2] rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob pointer-events-none' }),
            jsx('div', { className: 'fixed top-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-[#99F6E4] rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob animation-delay-2000 pointer-events-none' }),

            /* Main Content Container */
            jsx('div', {
              className: 'relative z-10 flex-grow flex items-center justify-center p-6',
              children: jsxs('div', {
                className: 'w-full max-w-2xl',
                children: [
                  /* Back button */
                  jsxs('button', {
                    onClick: navigateBack,
                    className: 'mb-8 flex items-center text-slate-500 hover:text-slate-800 transition-colors font-medium',
                    children: [
                      jsx('svg', {
                        xmlns: 'http://www.w3.org/2000/svg', className: 'h-5 w-5 mr-2', fill: 'none',
                        viewBox: '0 0 24 24', stroke: 'currentColor',
                        children: jsx('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M10 19l-7-7m0 0l7-7m-7 7h18' })
                      }),
                      'Back'
                    ]
                  }),

                  /* Dropzone card */
                  jsxs('div', {
                    className: 'bg-white rounded-3xl shadow-xl p-10 text-center border border-slate-100',
                    children: [
                      /* Icon banner */
                      jsx('div', {
                        className: 'bg-emerald-100 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6',
                        children: jsx('svg', {
                          xmlns: 'http://www.w3.org/2000/svg', className: 'h-10 w-10 text-emerald-600', fill: 'none',
                          viewBox: '0 0 24 24', stroke: 'currentColor',
                          children: jsx('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12' })
                        })
                      }),

                      jsx('h1', { className: 'text-3xl font-bold text-slate-900 mb-4', children: 'Upload your Resume' }),
                      jsx('p', { className: 'text-slate-500 mb-8 max-w-md mx-auto', children: "Upload your existing PDF resume. We'll extract the details so you can skip the manual data entry." }),

                      /* Drag area */
                      jsx('div', {
                        onDragEnter: handleDrag,
                        onDragLeave: handleDrag,
                        onDragOver: handleDrag,
                        onDrop: handleDrop,
                        className: `border-3 border-dashed rounded-2xl p-10 transition-all ${
                          isDragging ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200 bg-slate-50 hover:bg-slate-100'
                        }`,
                        children: isAnalyzing ? jsxs('div', {
                          className: 'flex flex-col items-center py-8',
                          children: [
                            jsx('div', { className: 'animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mb-4' }),
                            jsx('p', { className: 'text-lg font-semibold text-slate-700', children: 'Analyzing your resume...' })
                          ]
                        }) : jsxs(Fragment, {
                          children: [
                            jsx('p', { className: 'text-slate-700 font-medium mb-2', children: 'Drag and drop your PDF here' }),
                            jsx('p', { className: 'text-slate-400 text-sm mb-6', children: 'or' }),
                            jsx('button', {
                              onClick: () => fileInputRef.current?.click(),
                              className: 'px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg shadow-md transition-colors',
                              children: 'Browse Files'
                            }),
                            jsx('input', {
                              ref: fileInputRef,
                              type: 'file',
                              className: 'hidden',
                              accept: '.pdf',
                              onChange: handleFileChange
                            })
                          ]
                        })
                      })
                    ]
                  })
                ]
              })
            })
          ]
        });
      };

      /* --- Mount --- */
      const rootElement = document.getElementById('root');
      const root = createRoot(rootElement);
      root.render(jsx(React.StrictMode, { children: jsx(ResumeUploadPage, {}) }));
    </script>
  </body>
</html>
